name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - name: Ruff check
        run: uv run ruff check agent tests

  test:
    name: Tests + 100% coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - name: Compile check
        run: uv run python -m py_compile agent/*.py
      - name: Unit + integration tests (100% coverage gate)
        run: uv run pytest -q
